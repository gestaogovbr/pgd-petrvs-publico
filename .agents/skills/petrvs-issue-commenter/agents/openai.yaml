interface:
  display_name: "Petrvs Issue Commenter"
  short_description: "Rascunha comentários seguros para issues"
  default_prompt: "Use $petrvs-issue-commenter to draft a clear issue comment and wait for my approval before publishing."
dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP server for publishing approved issue comments"
policy:
  allow_implicit_invocation: true

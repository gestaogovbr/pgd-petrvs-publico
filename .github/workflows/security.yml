name: Security Checks

on:
  push:
    branches:
      - dataprev_dsv
      - dataprev_hmg
  pull_request:
    branches:
      - dataprev_dsv
      - dataprev_hmg
  schedule:
    - cron: '0 3 * * 1'

jobs:
  backend_sca:
    name: Backend SCA (Composer Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, json, zip, pdo, pdo_mysql, soap, gd, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        working-directory: back-end
        run: composer install --no-interaction --prefer-dist

      - name: Run Composer Audit
        working-directory: back-end
        run: composer audit --no-interaction


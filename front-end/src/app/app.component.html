<div class="d-flex flex-column h-100 petrvs">
  <ng-template #dialogs></ng-template>

  @if (error.length) {
    <div class="alert alert-danger mt-2" role="alert">
      <span><u><strong>{{ (error || '').split('&')[0] }}</strong></u></span><br>{{ (error || '').split('&')[1] }}
    </div>
  }

  @if (auth.logged) {
    <app-shell-v2>
      @for (topAlert of dialog.topAlerts; track topAlert.id) {
        <top-alert type="alert"
          [id]="topAlert.id" [close]="topAlert.close"
          [message]="topAlert.message" [closable]="topAlert.closable">
        </top-alert>
      }
      <router-outlet></router-outlet>
    </app-shell-v2>
  } @else {
    <router-outlet></router-outlet>
  }
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>


<div class="card h-100" [ngStyle]="{'cursor': route ? 'pointer' : 'inherit'}" (click)="onClick()">
  <div class="card-body text-center buttons-home">
    <i
      *ngIf="iconClass"
      [class]="iconClass + ' button-dashboard-bi'"
      [style.color]="textColor"
      aria-hidden="true"></i>
    <div *ngIf="!iconClass && imgIcon" [innerHTML]="sanitizer.bypassSecurityTrustHtml((seuCodigoSvg$ | async) ?? '')"></div>
    <h2 class="fs-5 fw-semibold mt-3">{{title}}</h2>
  </div>
</div>

<grid [dao]="dao"
    [title]="isModal ? '' : title"
    [hasAdd]="false"
    [hasEdit]="false"
    [selectable]="selectable"
    [orderBy]="orderBy"
>
    <toolbar *ngIf="!selectable"></toolbar>
    <filter [form]="filter" [where]="filterWhere" [submit]="filterSubmit.bind(this)">
        <div class="row">
            <input-text [size]="3" label="CPF" controlName="cpf" placeholder="CPF..." [attr.maxlength]="14" [form]="filter"></input-text>
            <input-select
                [size]="2"
                label="Status"
                controlName="status"
                [items]="lookup.ENVIO_USUARIO_STATUS"
                [control]="filter!.controls.status"
                itemTodos="- Todos -" [valueTodos]="null"/>
        </div>
    </filter>
    <columns>
        <column title="CPF" field="cpf"></column>
        <column title="Nome" field="nome"></column>
        <column title="Matrícula" field="matricula"></column>
        <column title="Atualizado em" [template]="columnUpdatedAt">
            <ng-template let-row="row" #columnUpdatedAt><span> {{row.updated_at | date:'dd/MM/yyyy HH:mm:ss'}}</span></ng-template>
        </column>
        <column title="Agendamento em" [template]="columnDataAgendamentoEnvio">
            <ng-template let-row="row" #columnDataAgendamentoEnvio><span> {{row.data_agendamento_envio | date:'dd/MM/yyyy HH:mm:ss'}}</span></ng-template>
        </column>
        <column title="Tentativa de Envio" [template]="columnDataTentativaEnvio">
            <ng-template let-row="row" #columnDataTentativaEnvio><span> {{row.data_tentativa_envio | date:'dd/MM/yyyy HH:mm:ss'}}</span></ng-template>
        </column>
        <column title="Envio bem sucedido" [template]="columnDataEnvioApiPgd">
            <ng-template let-row="row" #columnDataEnvioApiPgd><span> {{row.data_envio_api_pgd | date:'dd/MM/yyyy HH:mm:ss'}}</span></ng-template>
        </column>
        <column title="Log de envio" field="log_envio"></column>
    </columns>
    <pagination [rows]="rowsLimit"></pagination>
</grid>

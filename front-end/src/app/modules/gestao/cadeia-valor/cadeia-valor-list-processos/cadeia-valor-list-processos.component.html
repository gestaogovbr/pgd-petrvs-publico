<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h6 class="mb-0">Processos da Cadeia de Valor</h6>
    <button type="button" class="btn btn-sm btn-primary" (click)="addProcesso()" [disabled]="editingId">
      <i class="bi bi-plus-circle"></i> Adicionar
    </button>
  </div>
  <div class="card-body p-0">
    <div class="list-group list-group-flush">
      <div *ngFor="let processo of items" 
           class="list-group-item processo-item"
           [class.editing]="editingId === processo.id"
           [class.dragging]="draggedProcesso?.id === processo.id"
           [class.drop-target]="dropTarget?.id === processo.id"
           [class.drop-before]="dropTarget?.id === processo.id && dropPosition === 'before'"
           [class.drop-after]="dropTarget?.id === processo.id && dropPosition === 'after'"
           [class.drop-child]="dropTarget?.id === processo.id && dropPosition === 'child'"
           [draggable]="!editingId"
           (dragstart)="onDragStart($event, processo)"
           (dragover)="onDragOver($event, processo)"
           (drop)="onDrop($event, processo)"
           (dragend)="onDragEnd()"
           (dragleave)="dropTarget = null; dropPosition = null">
        
        <div class="d-flex align-items-center" [style.padding-left.px]="getIndent(processo) * 30">
          
          <i class="bi bi-grip-vertical me-2 text-muted drag-handle" *ngIf="!editingId"></i>
          
          <span class="badge bg-secondary me-2">{{getNivel(processo)}}</span>
          
          <div class="flex-fill" *ngIf="editingId !== processo.id">
            <strong>{{processo.nome}}</strong>
          </div>
          
          <div *ngIf="editingId === processo.id" class="flex-fill me-2">
            <input type="text" class="form-control form-control-sm" [(ngModel)]="processo.nome" placeholder="Nome do processo">
          </div>
          
          <div class="btn-group btn-group-sm ms-2" *ngIf="editingId !== processo.id">
            <button type="button" class="btn btn-outline-secondary" (click)="editingId = processo.id" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="addChildProcesso(processo)" title="Adicionar filho">
              <i class="bi bi-plus-circle"></i>
            </button>
            <button type="button" class="btn btn-outline-danger" (click)="removeProcesso(processo)" title="Excluir">
              <i class="bi bi-trash"></i>
            </button>
          </div>
          
          <div class="btn-group btn-group-sm ms-2" *ngIf="editingId === processo.id">
            <button type="button" class="btn btn-success" (click)="saveProcesso(processo)" title="Salvar">
              <i class="bi bi-check-lg"></i>
            </button>
            <button type="button" class="btn btn-secondary" (click)="cancelEdit()" title="Cancelar">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
      
      <div class="list-group-item text-center text-muted" *ngIf="items.length === 0">
        <small>Nenhum processo cadastrado</small>
      </div>
    </div>
  </div>
</div>

<!-- Seleção do planejamento -->
<editable-form [form]="form!" noButtons>
    <div class="row my-2">
        <input-select #cadeiaValorInstitucional [size]="12" controlName="cadeia_valor_id" [control]="form!.controls.cadeia_valor_id" [items]="cadeiasValor" (change)="onCadeiaValorChange()"></input-select>
    </div>
</editable-form>

<div class="mapa-container" *ngIf="cadeiaValor">
    <!-- Macroprocessos -->
    <div *ngFor="let macro of processos" class="macroprocesso-container">
        <!-- Nível 1: Macroprocesso -->
        <div class="nivel-1" [style.background-color]="macro.cor || '#e0e0e0'">
            <div class="conteudo">
                <strong>{{macro.nome}}</strong>
            </div>
        </div>

        <!-- Nível 2: Processos -->
        <div class="processos-container">
            <div *ngFor="let processo of macro.children" class="processo-wrapper">
                <div class="nivel-2" [style.background-color]="processo.cor || '#f5f5f5'">
                    <div class="conteudo">
                        <strong>{{processo.nome}}</strong>
                    </div>
                </div>

                <!-- Nível 3: Subprocessos -->
                <div class="subprocessos-container" *ngIf="processo.children && processo.children.length > 0">
                    <div *ngFor="let subprocesso of processo.children" class="nivel-3" [style.background-color]="subprocesso.cor || '#ffffff'">
                        <div class="conteudo">
                            <span>{{subprocesso.nome}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Button (Standard Toolbar) -->
<toolbar [buttons]="toolbarButtons" *ngIf="!disabled"></toolbar>


<div class="d-flex mb-2 fw-bold border-bottom pb-2 align-items-center">
  <div class="flex-fill ps-2">Nome</div>
  <div class="px-2 flex-shrink-0" style="width: 300px;">Fundamentação</div>
  <div class="text-end pe-2 flex-shrink-0" style="width: 150px;">Ações</div>
</div>

<div cdkDropListGroup>
  <ng-container *ngTemplateOutlet="recursiveList; context:{ list: treeNodes, parentId: null }"></ng-container>
</div>

<ng-template #recursiveList let-list="list" let-parentId="parentId" let-level="level" let-parentSeq="parentSeq">
  <div cdkDropList 
       [cdkDropListData]="list" 
       [id]="parentId || 'root-list'" 
       (cdkDropListDropped)="drop($event)"
       class="list-group list-group-flush">
       
    <div *ngFor="let item of list; let i = index" cdkDrag [cdkDragData]="item" class="list-group-item p-0 border-0 bg-transparent">
      
      <!-- Row Content -->
      <div class="d-flex align-items-center py-2 border-bottom">
        <div class="flex-fill d-flex align-items-center ps-2" style="min-width: 0;">
            <!-- Indentation Spacer -->
            <div [style.width.px]="(level || 0) * 30" class="flex-shrink-0"></div>

            <!-- Drag Handle -->
            <i class="bi bi-grip-vertical me-2 text-muted" cdkDragHandle style="cursor: move;"></i>
            
            <!-- Toggler -->
            <div style="width: 20px;" class="me-1 text-center flex-shrink-0">
                <i *ngIf="item.objetivos?.length" 
                   (click)="toggle(item)" 
                   class="bi" 
                   [class.bi-caret-down-fill]="isExpanded(item)" 
                   [class.bi-caret-right-fill]="!isExpanded(item)"
                   style="cursor: pointer;"></i>
            </div>
            
            <!-- Sequence and Name -->
            <div class="d-flex flex-column flex-fill" style="min-width: 0;">
                <ng-container *ngIf="((level || 0) === 0) && (item.eixo_tematico || (item.eixo_tematico_id && getEixo(item.eixo_tematico_id))) as eixo">
                    <badge [icon]="eixo.icone || 'bi bi-gear'" 
                           [color]="eixo.cor || 'primary'" 
                           [label]="eixo.nome"></badge>
                </ng-container>
                <span [title]="item.nome"><strong>{{ (parentSeq ? parentSeq + '.' : '') + (i + 1) }}</strong> - {{ item.nome }}</span>
                
            </div>
        </div>
        
        <div class="px-2 text-truncate flex-shrink-0" style="width: 300px;" [title]="item.fundamentacao">
            {{ item.fundamentacao }}
        </div>
        
        <div class="text-end pe-2 flex-shrink-0" style="width: 150px;">
             <!-- Options & Dynamic Buttons -->
             <div class="btn-group btn-group-sm">
                 <button *ngFor="let btn of dynamicButtons(item)" 
                         type="button"
                         class="btn btn-outline-secondary" 
                         [class]="btn.color || 'btn-outline-secondary'" 
                         (click)="btn.onClick && btn.onClick(item)" 
                         [title]="btn.hint || ''">
                   <i [class]="btn.icon"></i>
                 </button>
                 <button *ngFor="let opt of options"
                         type="button"
                         class="btn btn-outline-secondary"
                         [class]="opt.color || 'btn-outline-secondary'"
                         (click)="opt.onClick && opt.onClick(item)" 
                         [title]="opt.hint || ''">
                   <i [class]="opt.icon"></i>
                 </button>
             </div>
        </div>
      </div>

      <!-- Children -->
      <div *ngIf="isExpanded(item)">
         <ng-container *ngTemplateOutlet="recursiveList; context:{ 
             list: item.objetivos, 
             parentId: item.id, 
             level: (level || 0) + 1,
             parentSeq: (parentSeq ? parentSeq + '.' : '') + (i + 1)
         }"></ng-container>
      </div>
      
    </div>
    
    <!-- Empty placeholder -->
    <div class="list-group-item p-3 text-center text-muted fst-italic bg-transparent" *ngIf="list.length === 0">
        <small>Arraste itens aqui</small>
    </div>
    
  </div>
</ng-template>

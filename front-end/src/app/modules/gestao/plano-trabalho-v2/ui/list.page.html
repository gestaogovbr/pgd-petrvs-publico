<div class="container-fluid py-3">
  <h2 class="mb-3">Planos de Trabalho v2</h2>

  <form [formGroup]="filters" class="mb-3">
    <div class="rounded p-3 mb-3 border bg-body-tertiary text-body">
      <div class="d-flex align-items-end justify-content-start">
        <div>
          <div class="d-flex flex-column">
            <label class="form-label mb-1">Período: Início</label>
            <input type="date" class="form-control form-control-sm" formControlName="periodo_inicio" (change)="onFilterChange()" />
          </div>
        </div>
        <div class="ms-2">
          <div class="d-flex flex-column">
            <label class="form-label mb-1">Período: Fim</label>
            <input type="date" class="form-control form-control-sm" formControlName="periodo_fim" (change)="onFilterChange()" />
          </div>
        </div>
        <div class="form-check form-switch ms-2">
          <label class="form-check-label me-2">Subordinadas</label>
          <input class="form-check-input" type="checkbox" formControlName="incluir_subordinadas" [disabled]="isParticipante" (change)="onFilterChange()" />
        </div>
        <div class="form-check form-switch">
          <label class="form-check-label me-2">Vigentes</label>
          <input class="form-check-input" type="checkbox" formControlName="vigentes" (change)="onFilterChange()" />
        </div>
        <div class="form-check form-switch">
          <label class="form-check-label me-2">Arquivados</label>
          <input class="form-check-input" type="checkbox" formControlName="incluir_arquivados" (change)="onFilterChange()" />
        </div>
        <div class="form-check form-switch">
          <label class="form-check-label me-2">Meus Planos</label>
          <input class="form-check-input" type="checkbox" formControlName="meus_planos" (change)="onFilterChange()" />
        </div>
        <div class="ms-auto d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onConsultar()">
            <i class="bi bi-search me-1"></i>Consultar
          </button>
          <button type="button" class="btn btn-outline-primary btn-sm" (click)="toggleAdvanced()">
            <i class="bi" [ngClass]="advanced ? 'bi-funnel-fill' : 'bi-funnel'"></i>
            <span class="ms-1">Filtro avançado</span>
          </button>
        </div>
      </div>
      <div class="mt-3" [class.d-none]="!advanced">
        <div class="row">
          <div class="col-md-1 mb-3">
            <label class="form-label">#ID</label>
            <input type="text" class="form-control" formControlName="numero" (input)="onFilterChange()" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" class="form-control" formControlName="usuario" [disabled]="isParticipante" (input)="onFilterChange()" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Unidade</label>
            <input type="text" class="form-control" formControlName="unidade_regramento" (input)="onFilterChange()" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Modalidade</label>
            <input type="text" class="form-control" formControlName="modalidade" (input)="onFilterChange()" />
          </div>
          <div class="col-md-2 mb-3">
            <label class="form-label">Status do Plano</label>
            <input type="text" class="form-control" formControlName="status" (input)="onFilterChange()" />
          </div>
        </div>
      </div>
    </div>
  </form>

  @if (facade.loading()) {
    <div>Carregando...</div>
  }

  <table class="table table-sm table-striped">
    <thead>
      <tr>
        <th>Número</th>
        <th>Unidade</th>
        <th>Modalidade</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (p of facade.items(); track p.id) {
        <tr>
          <td>{{ p.numero }}</td>
          <td>{{ p.unidade_id }}</td>
          <td>{{ p.tipo_modalidade?.nome }}</td>
          <td>{{ p.status }}</td>
        </tr>
      }
    </tbody>
  </table>

  <div class="d-flex justify-content-between align-items-center">
    <button class="btn btn-outline-secondary btn-sm" (click)="prev()" [disabled]="facade.page() <= 1">Anterior</button>
    <span>Página {{ facade.page() }}</span>
    <button class="btn btn-outline-secondary btn-sm" (click)="next()">Próxima</button>
  </div>
</div>

<div class="container-fluid py-3 govbr-v2">
  
  
  <br-card>
    <h5>Informações gerais</h5>

    <div class="card-body">
      <form [formGroup]="form">
          <div class="row">
            <div class="col-md-4 mb-3 position-relative">
              <div class="d-flex align-items-center gap-2">
                <br-input [placeholder]="'Digite nome ou matrícula (mín. 3)'" [formControl]="agentePublicoQuery" label="Agente Público" autocomplete="on"></br-input>
                <br-button emphasis="secondary" (clicked)="limparUsuarioSelecionado()" [disabled]="saving">Limpar</br-button>
              </div>
              @if (sugestoesUsuarios.length > 0) {
                <br-card class="position-absolute w-100" style="z-index: 1050;">
                  @for (u of sugestoesUsuarios; track u.id) {
                    <div class="d-flex justify-content-between align-items-center px-2 py-1">
                      <div class="text-truncate">
                        {{ u.nome }} @if (u.matricula) { <span class="text-body-secondary">({{ u.matricula }})</span> }
                      </div>
                      <br-button emphasis="secondary" (clicked)="selecionarUsuario(u)">Selecionar</br-button>
                    </div>
                  }
                </br-card>
              }
            </div>

            <div class="col-md-4 mb-3">
              <br-select formControlName="unidade_id" (change)="onUnidadeChange()" [options]="unidades.map(u => ({ value: u.id, label: u.nome }))" label="Unidade"></br-select>
            </div>

            <div class="col-md-4 mb-3">
              <br-input label="Regramento de Instituição PGD" readonly formControlName="programa_id"></br-input>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-md-3 mb-3">
              <br-input type="date" formControlName="data_inicio" label="Início"></br-input>
            </div>

            <div class="col-md-3 mb-3">
              <br-input type="date" formControlName="data_fim" label="Final"></br-input>
            </div>

            <div class="col-md-6 mb-3">
              <br-select formControlName="tipo_modalidade_id" [options]="modalidades.map(m => ({ value: m.id, label: m.nome }))" label="Modalidade"></br-select>
            </div>
          </div>
      </form>
    </div>
  </br-card>

  <div class="d-flex gap-2">
    <br-button emphasis="secondary" (clicked)="voltar()" [disabled]="saving">Voltar</br-button>
    <br-button emphasis="primary" (clicked)="salvar()" [disabled]="!podeSalvar">Salvar</br-button>
  </div>

</div>

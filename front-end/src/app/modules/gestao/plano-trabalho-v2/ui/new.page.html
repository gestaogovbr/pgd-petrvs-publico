<div class="container-fluid py-3 govbr-v2">
  
  <div class="br-card">
    <div class="card-header text-weight-semi-bold text-up-02">
      Informações gerais
    </div>
    <div class="card-content">
      <form [formGroup]="form">
          <div class="row">
            <div class="col-md-4 mb-3 position-relative">
              <div class="d-flex align-items-end gap-2">
                <div class="br-input flex-grow-1">
                  <label>Agente Público</label>
                  <input type="text" placeholder="Digite nome ou matrícula (mín. 3)" [formControl]="agentePublicoQuery" autocomplete="on" />
                </div>
                <button class="br-button secondary" type="button" (click)="limparUsuarioSelecionado()" [disabled]="saving()">Limpar</button>
              </div>
              @if (sugestoesUsuarios().length > 0) {
                <div class="br-card position-absolute w-100" style="z-index: 1050;">               
                  @for (u of sugestoesUsuarios(); track u.id) {
                    <div class="card-content d-flex justify-content-between align-items-center px-2 py-1">
                      <div class="text-truncate">
                        {{ u.nome }} @if (u.matricula) { <span class="text-body-secondary">({{ u.matricula }})</span> }
                      </div>
                      <button class="br-button secondary" type="button" (click)="selecionarUsuario(u)">Selecionar</button>
                    </div>
                  }
                </div>
              }
            </div>

            <div class="col-md-4 mb-3">
              <input type="hidden" formControlName="unidade_id" />
              <div class="br-select w-100" (click)="$event.stopPropagation()">
                <div class="br-input">
                  <label for="unidade_id_display">Unidade</label>
                  <input
                    id="unidade_id_display"
                    type="text"
                    placeholder="Selecione o item"
                    readonly
                    [value]="unidadeSelecionadaLabel()"
                    (click)="$event.stopPropagation(); toggleSelect('unidade')"
                  />
                  <button
                    class="br-button"
                    type="button"
                    tabindex="-1"
                    data-trigger="data-trigger"
                    (click)="$event.stopPropagation(); toggleSelect('unidade')"
                  >
                    <i class="fas fa-angle-down" aria-hidden="true"></i>
                  </button>
                </div>
                <div class="br-list" tabindex="0" [attr.expanded]="selectAberto() === 'unidade' ? '' : null">
                  @for (u of unidades(); track u.id) {
                    <div class="br-item" tabindex="-1">
                      <div class="br-radio">
                        <input
                          [id]="'unidade_' + u.id"
                          type="radio"
                          name="unidade_id_options"
                          [value]="u.id.toString()"
                          [checked]="form.controls.unidade_id.value === u.id.toString()"
                          (change)="selecionarUnidade(u)"
                        />
                        <label [for]="'unidade_' + u.id">{{ u.sigla }}</label>
                      </div>
                    </div>
                  }
                </div>
              </div>
            </div>

            <div class="col-md-4 mb-3">
              <div class="br-input">
                <label>Regramento de Instituição PGD</label>
                <input type="text" readonly [value]="programaNome()" />
              </div>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-md-3 mb-3">
              <div class="br-input">
                <label>Início</label>
                <input type="date" formControlName="data_inicio" />
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <div class="br-input">
                <label>Final</label>
                <input type="date" formControlName="data_fim" />
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <input type="hidden" formControlName="tipo_modalidade_id" />
              <div class="br-select w-100" (click)="$event.stopPropagation()">
                <div class="br-input">
                  <label for="tipo_modalidade_id_display">Modalidade</label>
                  <input
                    id="tipo_modalidade_id_display"
                    type="text"
                    placeholder="Selecione o item"
                    readonly
                    [value]="modalidadeSelecionadaLabel()"
                    (click)="$event.stopPropagation(); toggleSelect('modalidade')"
                  />
                  <button
                    class="br-button"
                    type="button"
                    tabindex="-1"
                    data-trigger="data-trigger"
                    (click)="$event.stopPropagation(); toggleSelect('modalidade')"
                  >
                    <i class="fas fa-angle-down" aria-hidden="true"></i>
                  </button>
                </div>
                <div class="br-list" tabindex="0" [attr.expanded]="selectAberto() === 'modalidade' ? '' : null">
                  @for (m of modalidades(); track m.id) {
                    <div class="br-item" tabindex="-1">
                      <div class="br-radio">
                        <input
                          [id]="'modalidade_' + m.id"
                          type="radio"
                          name="tipo_modalidade_id_options"
                          [value]="m.id.toString()"
                          [checked]="form.controls.tipo_modalidade_id.value === m.id.toString()"
                          (change)="selecionarModalidade(m)"
                        />
                        <label [for]="'modalidade_' + m.id">{{ m.nome }}</label>
                      </div>
                    </div>
                  }
                </div>
              </div>
            </div>
          </div>
      </form>
    </div>
  </div>

  <div class="d-flex gap-2 mt-3">
    <button class="br-button secondary" type="button" (click)="voltar()" [disabled]="saving()">Voltar</button>
    <button class="br-button primary" type="button" (click)="salvar()" [disabled]="!podeSalvar()">Salvar</button>
  </div>

</div>

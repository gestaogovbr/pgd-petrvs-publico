<div class="container-fluid py-3 govbr-v2">
  <app-breadcrumb />
  <h2 class="mb-0">Novo Plano de Trabalho</h2>

  <div class="br-card">
    <div class="card-header text-weight-semi-bold text-up-02 p-2x bg-gray-10">
      Informações gerais
    </div>
    <div class="card-content">
      <form [formGroup]="form">
          <div class="row">
            <div class="col-md-4 mb-3 position-relative">
              <div class="d-flex align-items-end gap-2">
                <div class="br-input flex-grow-1">
                  <label>Agente Público</label>
                  <input type="text" placeholder="Digite nome ou matrícula (mín. 3)" [formControl]="agentePublicoQuery" autocomplete="on" />
                </div>
                <br-button emphasis="secondary" type="button" (click)="limparUsuarioSelecionado()" [disabled]="saving()">Limpar</br-button>
              </div>
              @if (sugestoesUsuarios().length > 0) {
                <div class="br-card position-absolute w-100" style="z-index: 1050;">
                  @for (u of sugestoesUsuarios(); track u.id) {
                    <div class="card-content d-flex justify-content-between align-items-center px-2 py-1">
                      <div class="text-truncate">
                        {{ u.nome }} @if (u.matricula) { <span class="text-body-secondary">({{ u.matricula }})</span> }
                      </div>
                      <br-button emphasis="secondary" type="button" (click)="selecionarUsuario(u)">Selecionar</br-button>
                    </div>
                  }
                </div>
              }
            </div>

            <div class="col-md-4 mb-3">
              <br-select label="Unidade" formControlName="unidade_id" [options]="unidadesOptions()" />
            </div>

            <div class="col-md-4 mb-3">
              <div class="br-input">
                <label>Regramento de Instituição PGD</label>
                <input type="text" readonly [value]="programaNome()" />
              </div>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-md-3 mb-3">
              <div class="br-input">
                <label>Início</label>
                <input type="date" formControlName="data_inicio" />
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <div class="br-input">
                <label>Final</label>
                <input type="date" formControlName="data_fim" />
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <br-select label="Modalidade" formControlName="tipo_modalidade_id" [options]="modalidadesOptions()" />
            </div>
          </div>
      </form>
    </div>
  </div>

  <div class="d-flex gap-2 mt-3">
    <br-button type="button" (click)="voltar()" [disabled]="saving()">Voltar</br-button>
    <br-button emphasis="primary" type="button" (click)="salvar()" [disabled]="!podeSalvar()">Salvar</br-button>
  </div>

</div>

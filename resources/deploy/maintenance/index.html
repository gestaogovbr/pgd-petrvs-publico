<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviço em Atualização</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 28px 22px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
    }
    h1 { margin: 0 0 14px; font-size: 1.7rem; }
    p { margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Serviço em Atualização</h1>
    <p>Estamos finalizando uma atualização, tente novamente em alguns minutos.</p>
  </main>
</body>
</html>

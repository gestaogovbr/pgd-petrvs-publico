services:

  petrvs_db:
    image: mariadb:latest
    container_name: petrvs_db
    ports:
      - 3308:3308
    volumes:
      - ../mariadb:/var/lib/mysql
      - ./my.cnf:/etc/mysql/my.cnf
      - ../../../back-end/storage/logs:/var/www/storage/logs
    environment:
      MYSQL_ROOT_PASSWORD: PsEeTnRhVaS
      MYSQL_USER: petrvs
      MYSQL_PASSWORD: PsEeTnRhVaS
      MYSQL_TCP_PORT: 3308
      TZ: "America/Bahia"
    deploy:
      resources:
        limits:
          memory: 2048M
    networks:
      - appnet

  petrvs_base: &petrvs_base
    build:
      context: .
      dockerfile: Dockerfile-php
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www
    environment:
      - TZ=America/Bahia
      - REDIS_HOST=petrvs_redis
      - RABBITMQ_HOST=petrvs_rabbitmq
    volumes:
      - ../../../back-end:/var/www
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - appnet

  petrvs_php:
    <<: *petrvs_base
    container_name: petrvs_php
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - APP_CONTEXT=web
    depends_on:
      petrvs_db:
        condition: service_started
      petrvs_redis:
        condition: service_started
      petrvs_rabbitmq:
        condition: service_healthy
    networks:
      - appnet

  petrvs_rabbitmq:
    image: rabbitmq:3-management
    container_name: petrvs_rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # UI de gerenciamento
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: petrvs
      RABBITMQ_DEFAULT_PASS: petrvs
      RABBITMQ_DEFAULT_VHOST: /
      TZ: "America/Bahia"
    volumes:
      - ../../rabbitmq/data:/var/lib/rabbitmq
      - ../../rabbitmq/logs:/var/log/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - appnet

  petrvs_queue:
    <<: *petrvs_base
    container_name: petrvs_queue
    command: ["/bin/bash", "-c", "mkdir -p /var/www/storage/logs && touch /var/www/storage/logs/mysql-slow.log && chmod 660 /var/www/storage/logs/mysql-slow.log && supervisord -c /etc/supervisor/conf.d/horizon.conf"]
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - APP_CONTEXT=queue
    depends_on:
      petrvs_db:
        condition: service_started
      petrvs_redis:
        condition: service_started
      petrvs_rabbitmq:
        condition: service_healthy
    networks:
      - appnet

  petrvs_scheduler:
    <<: *petrvs_base
    container_name: petrvs_scheduler
    command: >
      /bin/sh -c "while :; do php /var/www/artisan schedule:run >> /var/www/storage/logs/scheduler.log 2>&1; sleep 60; done"
    depends_on:
      petrvs_db:
        condition: service_started
      petrvs_redis:
        condition: service_started
      petrvs_rabbitmq:
        condition: service_healthy
    environment:
      - APP_CONTEXT=scheduler
    networks:
      - appnet
  
  petrvs_node:
    build:
      context: .
      dockerfile: Dockerfile-node
    container_name: petrvs_node
    command: sh -c "sleep infinity"
    working_dir: /usr/src/app
    environment:
      - NODE_ENV=production
      - TZ=America/Bahia
    ports:
      - "4200:4200"
    dns:
      - 1.1.1.1
    depends_on:
      - petrvs_php
    volumes:
      - ../../../front-end:/usr/src/app
      - ../../../back-end:/usr/src/back-end
      - ../../../resources:/usr/src/resources
    networks:
      - appnet

  petrvs_redis:
    image: redis:alpine
    container_name: petrvs_redis
    command: redis-server --bind 0.0.0.0 --protected-mode no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - appnet

networks:
  appnet:

volumes:
  redis-data:

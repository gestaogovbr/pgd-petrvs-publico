x-security-defaults: &security_defaults
  security_opt:
    - no-new-privileges:true
    - seccomp:../security/seccomp-cve-2026-31431.json

services:

  petrvs_db_producao:
    <<: *security_defaults
    image: mysql:8-debian
    build:
      context: .
      dockerfile: Dockerfile-db
    container_name: petrvs_db_producao
    volumes:
      - ../mysql:/var/lib/mysql
    environment:
      MYSQL_USER: petrvs
      MYSQL_PASSWORD: PsEeTnRhVaS
      MYSQL_ROOT_PASSWORD: PsEeTnRhVaS
      MYSQL_TCP_PORT: 3308
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2048M

  petrvs_php_producao:
    <<: *security_defaults
    build: 
      context: .
      dockerfile: Dockerfile-php
      args:
        ELASTIC_APM_ENABLED: ${ELASTIC_APM_ENABLED:-false}
    container_name: petrvs_php_producao
    working_dir: /var/www
    env_file:
      - ../../../back-end/.env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - petrvs_db_producao
    volumes:
      - ../../../back-end:/var/www
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2048M

# Sobre resources
# https://docs.docker.com/config/containers/resource_constraints/
